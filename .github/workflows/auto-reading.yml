name: Auto Reading Bot

on:
  schedule:
    - cron: '0 0 * * *'    # 北京时间 08:00
    - cron: '0 4 * * *'    # 北京时间 12:00
    - cron: '0 10 * * *'   # 北京时间 18:00
    - cron: '0 14 * * *'   # 北京时间 22:00

  workflow_dispatch:
    inputs:
      target_duration:
        description: '阅读时长（分钟，格式：55-65）'
        required: false
        default: ''
        type: string
      reading_mode:
        description: '阅读模式'
        required: false
        default: 'smart_random'
        type: choice
        options:
          - smart_random
          - sequential
          - pure_random
      notify_enabled:
        description: '启用通知'
        required: false
        default: true
        type: boolean
      notify_only_on_failure:
        description: '仅失败时发送通知'
        required: false
        default: true
        type: boolean
      history_enabled:
        description: '启用执行历史持久化'
        required: false
        default: true
        type: boolean
      history_max_entries:
        description: '执行历史最多保留多少条'
        required: false
        default: '50'
        type: string

jobs:
  auto-reading:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve runtime parameters
        env:
          INPUT_TARGET_DURATION: ${{ github.event.inputs.target_duration }}
          SECRET_TARGET_DURATION: ${{ secrets.TARGET_DURATION }}
        run: |
          target_duration="${INPUT_TARGET_DURATION}"

          if [ -z "$target_duration" ]; then
            target_duration="${SECRET_TARGET_DURATION}"
          fi

          if [ -z "$target_duration" ]; then
            target_duration="55-65"
          fi

          echo "TARGET_DURATION=$target_duration" >> "$GITHUB_ENV"

      - name: Create config file
        run: |
          cat > config.yaml <<EOF
          app:
            name: "WeReadBot-GitHub-Action"
            startup_mode: "immediate"
            startup_delay: "60-300"

          reading:
            mode: "${{ github.event.inputs.reading_mode || 'smart_random' }}"
            target_duration: "${TARGET_DURATION}"
            reading_interval: "35-60"
            use_curl_data_first: true
            fallback_to_config: true
            smart_random:
              book_continuity: 0.8
              chapter_continuity: 0.7
              book_switch_cooldown: 3600

          human_simulation:
            enabled: true
            reading_speed_variation: true
            break_probability: 0.15
            break_duration: "20-90"
            rotate_user_agent: false

          network:
            timeout: 30
            retry_times: 3
            retry_delay: "5-15"
            rate_limit: 10

          notification:
            enabled: ${{ github.event.inputs.notify_enabled != 'false' }}
            include_statistics: true
            only_on_failure: ${{ github.event.inputs.notify_only_on_failure != 'false' }}
            triggers:
              session_success: ${{ github.event.inputs.notify_only_on_failure == 'false' }}
              multi_user_summary: ${{ github.event.inputs.notify_only_on_failure == 'false' }}
              session_failure: true
              runtime_error: true
              general: true

          logging:
            level: "INFO"
            format: "detailed"
            file: "logs/weread.log"
            max_size: "10MB"
            backup_count: 5
            console: true

          history:
            enabled: ${{ github.event.inputs.history_enabled != 'false' }}
            file: "logs/run-history.json"
            max_entries: ${{ github.event.inputs.history_max_entries || '50' }}
            persist_runtime_error: true
          EOF

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run WeRead Bot
        env:
          HACK_COOKIE_REFRESH_QL: ${{ secrets.HACK_COOKIE_REFRESH_QL }}
          WEREAD_CURL_STRING: ${{ secrets.WEREAD_CURL_STRING }}
          MAX_CONCURRENT_USERS: ${{ secrets.MAX_CONCURRENT_USERS || 1 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
          APPRISE_URL: ${{ secrets.APPRISE_URL }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          BARK_SOUND: ${{ secrets.BARK_SOUND }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_MSG_TYPE: ${{ secrets.FEISHU_MSG_TYPE }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_MSG_TYPE: ${{ secrets.DINGTALK_MSG_TYPE }}
          GOTIFY_SERVER: ${{ secrets.GOTIFY_SERVER }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          GOTIFY_PRIORITY: ${{ secrets.GOTIFY_PRIORITY }}
          GOTIFY_TITLE: ${{ secrets.GOTIFY_TITLE }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          SERVERCHAN3_UID: ${{ secrets.SERVERCHAN3_UID }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SERVERCHAN3_TAGS: ${{ secrets.SERVERCHAN3_TAGS }}
          SERVERCHAN3_SHORT: ${{ secrets.SERVERCHAN3_SHORT }}
          PUSHDEER_PUSHKEY: ${{ secrets.PUSHDEER_PUSHKEY }}
          PUSHDEER_TYPE: ${{ secrets.PUSHDEER_TYPE }}
          TZ: 'Asia/Shanghai'
        run: |
          echo "开始自动阅读任务..."
          echo "当前时间: $(date)"
          echo "阅读时长: ${TARGET_DURATION}"
          python weread-bot.py --config config.yaml

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weread-runtime-${{ github.run_id }}
          path: |
            logs/weread.log
            logs/run-history.json
          if-no-files-found: warn
          retention-days: 7
